# Auto-deploy to DigitalOcean droplet on push to main
# Add these GitHub repo secrets (Settings → Secrets → Actions):
#   DO_HOST      — droplet IP e.g. 123.45.67.89
#   DO_USER      — ssh user e.g. root or deploy
#   DO_SSH_KEY   — private SSH key for the server
#   DO_APP_DIR   — optional, default /var/www/nlm-portal

name: Deploy to DigitalOcean

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            export APP_DIR="${{ secrets.DO_APP_DIR || '/var/www/nlm-portal' }}"
            cd "$APP_DIR"
            bash scripts/deploy.sh
