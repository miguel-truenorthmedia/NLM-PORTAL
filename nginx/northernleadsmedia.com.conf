# Combined site: marketing website at /, NLM portal at /admin
# Deploy copies website/dist → /var/www/northernleadsmedia.com
#                 portal/dist  → /var/www/northernleadsmedia.com/admin
#
# Install:
#   sudo cp nginx/northernleadsmedia.com.conf /etc/nginx/sites-available/
#   sudo ln -sf /etc/nginx/sites-available/northernleadsmedia.com.conf /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default /etc/nginx/sites-enabled/nlm-portal
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL:
#   sudo certbot --nginx -d northernleadsmedia.com -d www.northernleadsmedia.com

server {
    listen 80;
    server_name northernleadsmedia.com www.northernleadsmedia.com;

    root /var/www/northernleadsmedia.com;
    index index.html;

    location = /admin {
        return 301 /admin/;
    }

    # NLM portal SPA (VITE_BASE_PATH=/admin/)
    location /admin/ {
        try_files $uri $uri/ /admin/index.html;
    }

    # Portal API
    location /api {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Marketing website SPA
    location / {
        try_files $uri $uri/ /index.html;
    }
}
